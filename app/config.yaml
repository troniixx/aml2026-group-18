# ═══════════════════════════════════════════════════════════════════════════════
#  Naruto Hand Seal Detector — App Config
# ═══════════════════════════════════════════════════════════════════════════════

# ── Models ────────────────────────────────────────────────────────────────────
models:
  model_1:
    name:                 "Advanced Model - Swin"
    script:               "../Mert/swin_live.py"
    weights:              "../Mert/swin_best.pth"
    confidence_threshold: 0.4
  model_2:
    name:                 "Baseline - MobileNetV2"
    script:               "../Mert/mobilenet_live.py"
    weights:              "../Mert/mobilenetv2_best.pth"
    confidence_threshold: 0.4

active_model: "model_1"

# ── MediaPipe hand landmarker ─────────────────────────────────────────────────
mediapipe_model: "../Mert/hand_landmarker.task"

# ── Assets directory ──────────────────────────────────────────────────────────
assets_dir: "../assets"

# ── UI ────────────────────────────────────────────────────────────────────────
ui:
  panel_width:     470
  seal_thumb_size: 72
  camera_index:    0
  ghost_opacity:   0.40

  primary_color:   [240, 114, 172]   # naruto pink
  secondary_color: [240, 83,  33]    # naruto orange

# ── Seal images (cheatsheet thumbnails) ───────────────────────────────────────
active_seal_images: "seal_images"   # ← switch to "seal_images_v2" to use Chenxi's

# OG PNGs — used in the right-panel cheatsheet grid
seal_images: &seal_images
  rat:    "seals/transparent/rat_transparent.PNG"
  ox:     "seals/transparent/ox_transparent.PNG"
  tiger:  "seals/transparent/tiger_transparent.PNG"
  hare:   "seals/transparent/hare_transparent.PNG"
  dragon: "seals/transparent/dragon_transparent.PNG"
  snake:  "seals/transparent/snake_transparent.PNG"
  horse:  "seals/transparent/horse_transparent.PNG"
  ram:    "seals/transparent/ram_transparent.PNG"
  monkey: "seals/transparent/monkey_transparent.PNG"
  bird:   "seals/transparent/bird_transparent.PNG"
  dog:    "seals/transparent/dog_transparent.PNG"
  boar:   "seals/transparent/boar_transparent.PNG"

# from chenxi:
seal_images_v2: &seal_images_v2
  rat:    "new_found_pics/transprant/rat.PNG"
  ox:     "new_found_pics/transprant/ox.PNG"
  tiger:  "new_found_pics/transprant/tiger.PNG"
  hare:   "new_found_pics/transprant/hare.PNG"
  dragon: "new_found_pics/transprant/dragon.PNG"
  snake:  "new_found_pics/transprant/snake.PNG"
  horse:  "new_found_pics/transprant/horse.PNG"
  ram:    "new_found_pics/transprant/ram.PNG"
  monkey: "new_found_pics/transprant/monkey.PNG"
  bird:   "new_found_pics/transprant/bird.PNG"
  dog:    "new_found_pics/transprant/dog.PNG"
  boar:   "new_found_pics/transprant/boar.PNG"




# ── Ghost overlay images (PiP square on live feed) ────────────────────────────
# Non-transparent PNGs — used as the bottom-right PiP when a seal is clicked
ghost_images:
  rat:    "seals/rat.PNG"
  ox:     "seals/ox.PNG"
  tiger:  "seals/tiger.PNG"
  hare:   "seals/hare.PNG"
  dragon: "seals/dragon.PNG"
  snake:  "seals/snake.PNG"
  horse:  "seals/horse.PNG"
  ram:    "seals/ram.PNG"
  monkey: "seals/monkey.PNG"
  bird:   "seals/bird.PNG"
  dog:    "seals/dog.PNG"
  boar:   "seals/boar.PNG"

# ── Jutsu combos ─────────────────────────────────────────────────────────────
jutsu_combos:
  "Fire Style: Fireball Jutsu":       ["snake", "ram", "monkey", "boar", "horse", "tiger"]
  "Water Style: Hidden Mist Jutsu":   ["ox", "monkey", "rat", "ram", "snake", "dragon"]
  "Lightning Style: Chidori":         ["ox", "hare", "monkey"]
  "Wind Style: Great Breakthrough":   ["tiger", "ox", "dog", "hare", "bird"]
  "Shadow Clone Jutsu":               ["ram", "snake", "tiger"]
  "Body Flicker Jutsu":               ["ram", "horse", "snake"]
